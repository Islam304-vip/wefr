<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON MOTORS 777 | ELITE CARS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #050507;
            --card: #101014;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background-size: cover; background-position: center;
            filter: brightness(0.5); transition: 0.8s ease-in-out;
        }
        .dark-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(to bottom, rgba(5,5,7,0.4), var(--bg));
        }
        header {
            position: fixed; top: 0; width: 100%; padding: 25px 5%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Syncopate'; font-size: 24px; font-weight: 700; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary); }
        nav { display: flex; gap: 15px; }
        .nav-link {
            background: none; border: none; color: #fff; font-family: 'Syncopate'; font-size: 11px;
            padding: 10px 15px; cursor: pointer; transition: 0.3s; opacity: 0.6;
        }
        .nav-link.active, .nav-link:hover { opacity: 1; color: var(--primary); }
        .phone-top { 
            font-family: 'Syncopate'; color: var(--primary); font-weight: 700; 
            text-decoration: none; font-size: 16px; border: 2px solid var(--primary);
            padding: 10px 20px; transition: 0.3s;
        }
        .phone-top:hover { background: var(--primary); color: #000; }
        main { padding-top: 140px; min-height: 100vh; }
        .page { display: none; padding: 0 5% 100px; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .title-row { font-family: 'Syncopate'; font-size: 28px; margin-bottom: 40px; color: #fff; border-left: 5px solid var(--primary); padding-left: 20px; }
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 40px; }
        .car-card { background: var(--card); border: 1px solid var(--border); transition: 0.4s; overflow: hidden; position: relative; }
        .car-card:hover { border-color: var(--primary); transform: translateY(-10px); }
        .car-img { width: 100%; height: 300px; overflow: hidden; background: #222; }
        .car-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .car-card:hover .car-img img { transform: scale(1.1); }
        .car-info { padding: 30px; }
        .car-info h3 { font-family: 'Syncopate'; font-size: 20px; margin-bottom: 10px; }
        .car-price { font-family: 'Syncopate'; font-size: 24px; color: var(--primary); font-weight: 700; display: block; margin: 15px 0; }
        .specs-mini { display: flex; gap: 20px; color: #888; font-size: 13px; margin-bottom: 25px; }
        .btn-buy { width: 100%; padding: 18px; background: var(--primary); border: none; color: #000; font-family: 'Syncopate'; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-buy:hover { background: #fff; }
        footer { padding: 50px; text-align: center; border-top: 1px solid var(--border); margin-top: 50px; }
        .foot-text { opacity: 0.4; font-size: 12px; letter-spacing: 5px; }
    </style>
</head>
<body onload="loadData()">
    <div id="main-bg"></div>
    <div class="dark-layer"></div>
    <header>
        <a href="#" class="logo" onclick="show('home')">NEON<span>777</span></a>
        <nav>
            <button class="nav-link active" onclick="show('home', this)">ГЛАВНАЯ</button>
            <button class="nav-link" onclick="show('catalog', this)">КАТАЛОГ</button>
            <button class="nav-link" onclick="show('exclusive', this)">ЭКСКЛЮЗИВ</button>
            <button class="nav-link" onclick="show('contacts', this)">КОНТАКТЫ</button>
        </nav>
        <a href="tel:87777777777" class="phone-top">8 777 777 77 77</a>
    </header>
    <main>
        <section id="home" class="page active">
            <div style="height: 60vh; display: flex; flex-direction: column; justify-content: center;">
                <p style="letter-spacing: 8px; color: var(--primary); margin-bottom: 15px; font-weight: 700;">WELCOME TO THE FUTURE</p>
                <h1 style="font-family: 'Syncopate'; font-size: clamp(2.5rem, 9vw, 7rem); line-height: 0.9;">LUXURY<br><span style="color:var(--primary)">CARS</span> 2026</h1>
                <p style="max-width: 600px; margin: 30px 0; color: #ccc; font-size: 18px; line-height: 1.6;">Эксклюзивные авто в наличии. Прямые поставки из ОАЭ и Европы.</p>
                <button class="btn-buy" style="width: 280px;" onclick="show('catalog')">ПЕРЕЙТИ В КАТАЛОГ</button>
            </div>
        </section>
        <section id="catalog" class="page">
            <h2 class="title-row">ДОСТУПНЫЕ АВТОМОБИЛИ</h2>
            <div class="car-grid" id="catalog-list"></div>
        </section>
        <section id="exclusive" class="page">
            <h2 class="title-row">ЭКСКЛЮЗИВНЫЕ МОДЕЛИ</h2>
            <div class="car-grid" id="exclusive-list"></div>
        </section>
        <section id="contacts" class="page">
            <div style="text-align:center; padding: 50px; background: var(--card); border: 1px solid var(--border);">
                <h2 style="font-family: 'Syncopate'; color: var(--primary); font-size: 32px;">СВЯЖИТЕСЬ С НАМИ</h2>
                <a href="tel:87777777777" style="font-family: 'Syncopate'; font-size: 40px; color: #fff; text-decoration: none; display: block; margin: 30px 0;">8 777 777 77 77</a>
                <p>📍 г. Алматы, пр. Аль-Фараби, 77/7</p>
            </div>
        </section>
    </main>
    <footer>
        <div class="foot-text">NEON MOTORS HUB // 8 777 777 77 77 // ALL RIGHTS RESERVED</div>
    </footer>

    <script>
        const carStore = {
            catalog: [
                { name: "BMW M5 F90 CS", price: "85 000 000 ₸", img: "https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&w=1200", hp: "635 HP" },
                { name: "PORSCHE 911 GT3", price: "120 000 000 ₸", img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1200", hp: "510 HP" },
                { name: "LAMBO HURACAN STO", price: "165 000 000 ₸", img: "https://images.unsplash.com/photo-1544636331-e26879cd4d9b?auto=format&fit=crop&w=1200", hp: "640 HP" },
                { name: "AUDI RS6 AVANT", price: "78 000 000 ₸", img: "https://static0.carbuzzimages.com/wordpress/wp-content/uploads/2024/04/1226590.jpg", hp: "600 HP" },
                { name: "NISSAN GT-R R35", price: "65 000 000 ₸", img: "https://www.carscoops.com/wp-content/uploads/2019/12/nissan-gt-r-liberty-walk-tuning-0.jpg", hp: "570 HP" },
                { name: "MCLAREN P1", price: "850 000 000 ₸", img: "https://all-auto.org/wp-content/uploads/2020/05/McLaren-P1-3-2.jpg", hp: "916 HP" }
            ],
            exclusive: [
                { name: "RR GOLD EDITION", price: "1 000 000 000 ₸", img: "машина золото.webp", hp: "600 HP" },
                { name: "BUGATTI DIVO", price: "1 500 000 000 ₸", img: "фото машина бугати дива.jpg", hp: "1500 HP" },
                { name: "BUGATTI MISTRAL", price: "1 800 000 000 ₸", img: "https://live.staticflickr.com/790/39356375000_3f30f15d23_b.jpg", hp: "1600 HP" },
                { name: "BUGATTI CHIRON", price: "1 400 000 000 ₸", img: "https://cdn.bmwblog.com/wp-content/uploads/2016/03/Bugatti-Chiron-2016-Genf-Live-15.jpg", hp: "1500 HP" },
                { name: "KOENIGSEGG JESKO", price: "1 700 000 000 ₸", img: "https://www.topgear-magazine.fr/wp-content/uploads/2021/07/koenigsegg_jesko_attack_5-1024x576.jpeg", hp: "1600 HP" },
                { name: "LAMBO SIAN", price: "1 600 000 000 ₸", img: "https://images.unsplash.com/photo-1511919884226-fd3cad34687c?auto=format&fit=crop&w=1200", hp: "819 HP" }
            ]
        };

        const pageBgs = {
            home: 'https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1920',
            catalog: 'https://images.unsplash.com/photo-1542362567-b05260012803?auto=format&fit=crop&w=1920',
            exclusive: 'https://images.unsplash.com/photo-1614164185128-e4ec99c436d7?auto=format&fit=crop&w=1920',
            contacts: 'https://images.unsplash.com/photo-1563720223185-11003d516935?auto=format&fit=crop&w=1920'
        };

        function render(type, targetId) {
            const container = document.getElementById(targetId);
            container.innerHTML = carStore[type].map(car => `
                <div class="car-card">
                    <div class="car-img"><img src="${car.img}" alt="${car.name}" onerror="this.src='https://via.placeholder.com/400x300/101014/00f2ff?text=IMAGE+ERROR'"></div>
                    <div class="car-info">
                        <h3>${car.name}</h3>
                        <div class="specs-mini"><span>⚡ ${car.hp}</span><span>🏁 Limited</span></div>
                        <span class="car-price">${car.price}</span>
                        <button class="btn-buy" onclick="window.location.href='tel:87777777777'">ЗАБРОНИРОВАТЬ</button>
                    </div>
                </div>
            `).join('');
        }

        function loadData() {
            render('catalog', 'catalog-list');
            render('exclusive', 'exclusive-list');
            document.getElementById('main-bg').style.backgroundImage = `url(${pageBgs.home})`;
        }

        function show(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                btn.classList.add('active');
            }
            const bg = document.getElementById('main-bg');
            bg.style.opacity = '0';
            setTimeout(() => {
                bg.style.backgroundImage = `url(${pageBgs[id]})`;
                bg.style.opacity = '1';
            }, 300);
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
